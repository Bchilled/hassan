<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hassan MTG — 401 Dash</title>
  <style>
    :root{--bg:#0b1020;--panel:#1b2448;--line:#5f75d8;--text:#f1f4ff;--muted:#aab3e0}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at 20% 0,#2b1d66,#0b1020 50%);color:var(--text);display:grid;place-items:center;min-height:100vh}
    .wrap{width:min(96vw,980px)}
    .hud{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);padding:10px 12px;border-radius:10px;margin-bottom:8px}
    .stat{background:#222d5e;border:1px solid #4457b3;border-radius:999px;padding:4px 10px;font-size:14px}
    canvas{width:100%;aspect-ratio:16/10;background:#111a38;border:2px solid #6f83e3;border-radius:10px;box-shadow:0 14px 30px rgba(0,0,0,.45)}
    .hint{margin-top:8px;font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <strong>401 Dash: Mavis → Rutherford (Northern War Table)</strong>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="stat" id="leader">Leader: —</span>
      <span class="stat" id="dist">Distance: 0%</span>
      <span class="stat" id="state">Press Enter</span>
    </div>
  </div>
  <canvas id="game" width="960" height="600"></canvas>
  <div class="hint">Hassan = Green Car (WASD / arrows). Scott = Blue Car (IJKL). Avoid traffic. First to 100% wins.</div>
</div>

<script>
const c = document.getElementById('game');
const g = c.getContext('2d');
const ui = {
  leader:document.getElementById('leader'),
  dist:document.getElementById('dist'),
  state:document.getElementById('state')
};
const keys = {};
let started=false, ended=false;

const world = { speed: 6, maxDist: 6000, elapsed:0 };
const players = [
  {name:'Hassan', color:'#22c55e', x:220, y:500, w:52, h:92, vx:0, vy:0, acc:0.35, drag:0.94, top:8.5, distance:0, controls:{left:['KeyA','ArrowLeft'],right:['KeyD','ArrowRight'],up:['KeyW','ArrowUp'],down:['KeyS','ArrowDown']}, stun:0},
  {name:'Scott', color:'#3b82f6', x:680, y:500, w:52, h:92, vx:0, vy:0, acc:0.35, drag:0.94, top:8.5, distance:0, controls:{left:['KeyJ'],right:['KeyL'],up:['KeyI'],down:['KeyK']}, stun:0}
];

let traffic = [];
let roadOffset = 0;
let spawnCD = 0;
let winner = null;

function rand(min,max){return Math.random()*(max-min)+min}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function reset(){
  started=false; ended=false; winner=null; world.elapsed=0; roadOffset=0; spawnCD=0;
  players[0].x=220; players[1].x=680;
  players.forEach(p=>{p.vx=0;p.vy=0;p.distance=0;p.stun=0;p.y=500;});
  traffic=[];
  ui.state.textContent='Press Enter';
  ui.leader.textContent='Leader: —';
  ui.dist.textContent='Distance: 0%';
}

function keyAny(arr){return arr.some(k=>keys[k])}

function spawnTraffic(){
  const laneW = 140;
  const lanes = [200,340,480,620,760];
  const x = lanes[(Math.random()*lanes.length)|0] - 30;
  traffic.push({x, y:-120, w:60, h:110, vy:rand(4.8,9.2), color:['#ef4444','#f59e0b','#a855f7','#14b8a6'][(Math.random()*4)|0]});
}

function updatePlayer(p){
  if(p.stun>0){p.stun--; p.vx*=0.9; p.vy*=0.9;} else {
    if(keyAny(p.controls.left)) p.vx -= p.acc;
    if(keyAny(p.controls.right)) p.vx += p.acc;
    if(keyAny(p.controls.up)) p.vy -= p.acc;
    if(keyAny(p.controls.down)) p.vy += p.acc;
  }

  p.vx*=p.drag; p.vy*=p.drag;
  p.vx=clamp(p.vx,-p.top,p.top);
  p.vy=clamp(p.vy,-p.top,p.top);

  p.x += p.vx;
  p.y += p.vy;

  p.x = clamp(p.x,140,770);
  p.y = clamp(p.y,50,508);

  p.distance += Math.max(0, world.speed + (520-p.y)*0.005 - Math.abs(p.vx)*0.03);
}

function collisions(){
  for(const car of traffic){
    for(const p of players){
      if(overlap(p,car)){
        p.stun = 35;
        p.vy += 4;
        p.vx += (p.x < car.x ? -3 : 3);
        p.distance = Math.max(0, p.distance - 120);
      }
    }
  }
}

function update(){
  if(!started || ended) return;
  world.elapsed++;
  roadOffset += world.speed;

  spawnCD--;
  if(spawnCD<=0){spawnTraffic(); spawnCD = 20 + (Math.random()*20|0);}

  players.forEach(updatePlayer);

  for(const t of traffic){ t.y += t.vy + world.speed*0.45; }
  traffic = traffic.filter(t=>t.y < 720);

  collisions();

  const p1 = players[0].distance/world.maxDist;
  const p2 = players[1].distance/world.maxDist;

  if(p1>=1 || p2>=1){
    ended=true;
    winner = p1>=1 && p2>=1 ? (players[0].distance>=players[1].distance?players[0]:players[1]) : (p1>=1?players[0]:players[1]);
    ui.state.textContent = `${winner.name} wins! Press R`;
  } else {
    const lead = players[0].distance===players[1].distance ? 'Tie' : (players[0].distance>players[1].distance?players[0].name:players[1].name);
    ui.leader.textContent = `Leader: ${lead}`;
    ui.dist.textContent = `Distance: ${Math.floor(Math.max(p1,p2)*100)}%`;
    ui.state.textContent = 'Racing';
  }
}

function drawRoad(){
  g.fillStyle='#1f2937'; g.fillRect(130,0,700,600);
  g.fillStyle='#374151'; g.fillRect(130,0,10,600); g.fillRect(820,0,10,600);

  g.strokeStyle='#facc15'; g.lineWidth=3;
  g.setLineDash([26,24]); g.lineDashOffset = -roadOffset;
  for(let x=270; x<=690; x+=140){
    g.beginPath(); g.moveTo(x,0); g.lineTo(x,600); g.stroke();
  }
  g.setLineDash([]);

  // Signs
  g.fillStyle='#0f172a'; g.fillRect(20,40,95,42); g.fillRect(845,40,95,42);
  g.fillStyle='#e2e8f0'; g.font='12px sans-serif'; g.fillText('Mavis / 401',28,65); g.fillText('Rutherford / 400',850,65);
}

function drawCar(p){
  g.fillStyle=p.color; g.fillRect(p.x,p.y,p.w,p.h);
  g.fillStyle='#111827'; g.fillRect(p.x+8,p.y+10,36,22);
  g.fillStyle='#cbd5e1'; g.fillRect(p.x+10,p.y+12,32,12);
  g.fillStyle='#0b0f1d'; g.fillRect(p.x-4,p.y+10,6,16); g.fillRect(p.x+p.w-2,p.y+10,6,16); g.fillRect(p.x-4,p.y+66,6,16); g.fillRect(p.x+p.w-2,p.y+66,6,16);
  g.strokeStyle='#e5e7eb'; g.lineWidth=2; g.strokeRect(p.x,p.y,p.w,p.h);
  if(p.stun>0){ g.fillStyle='#fca5a5'; g.font='14px sans-serif'; g.fillText('!',p.x+22,p.y-8); }
  g.fillStyle='#fff'; g.font='12px sans-serif'; g.fillText(p.name,p.x-2,p.y-8);
}

function drawTraffic(t){
  g.fillStyle=t.color; g.fillRect(t.x,t.y,t.w,t.h);
  g.fillStyle='#111827'; g.fillRect(t.x+8,t.y+10,44,18);
  g.fillStyle='#d1d5db'; g.fillRect(t.x+10,t.y+12,40,10);
  g.fillStyle='#0b0f1d'; g.fillRect(t.x-4,t.y+8,6,16); g.fillRect(t.x+t.w-2,t.y+8,6,16); g.fillRect(t.x-4,t.y+74,6,16); g.fillRect(t.x+t.w-2,t.y+74,6,16);
}

function drawOverlay(){
  if(!started || ended){
    g.fillStyle='rgba(0,0,0,.55)'; g.fillRect(0,0,960,600);
    g.fillStyle='#fff'; g.textAlign='center';
    if(!started){
      g.font='42px system-ui'; g.fillText('401 DASH',480,240);
      g.font='18px system-ui'; g.fillText('Green Hassan vs Blue Scott',480,275);
      g.fillText('First to Northern War Table wins',480,300);
      g.fillText('Press Enter to start',480,335);
    } else if(ended){
      g.font='40px system-ui'; g.fillText(`${winner.name} WINS`,480,275);
      g.font='18px system-ui'; g.fillText('Press R to race again',480,310);
    }
    g.textAlign='start';
  }
}

function draw(){
  g.clearRect(0,0,960,600);
  drawRoad();
  traffic.forEach(drawTraffic);
  players.forEach(drawCar);

  // progress bars
  const p1 = Math.min(1,players[0].distance/world.maxDist);
  const p2 = Math.min(1,players[1].distance/world.maxDist);
  g.fillStyle='#111827'; g.fillRect(20,560,440,14); g.fillRect(500,560,440,14);
  g.fillStyle='#22c55e'; g.fillRect(22,562,436*p1,10);
  g.fillStyle='#3b82f6'; g.fillRect(502,562,436*p2,10);
  g.fillStyle='#fff'; g.font='12px sans-serif';
  g.fillText(`Hassan ${Math.floor(p1*100)}%`,22,555);
  g.fillText(`Scott ${Math.floor(p2*100)}%`,502,555);

  drawOverlay();
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Enter' && !started){ started=true; ui.state.textContent='Racing'; }
  if(e.code==='KeyR'){ reset(); }
});
addEventListener('keyup',e=> keys[e.code]=false);

reset();
loop();
</script>
</body>
</html>
