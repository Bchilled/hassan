<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hassan MTG — 401 Route Race</title>
  <style>
    body{margin:0;background:#0b1020;color:#eef2ff;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;display:grid;place-items:center;min-height:100vh}
    .wrap{width:min(96vw,980px)}
    .hud{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;background:#182347;border:1px solid #445ac0;border-radius:10px;padding:10px 12px;margin-bottom:8px}
    .pill{background:#22305f;border:1px solid #4a63d3;padding:4px 10px;border-radius:999px;font-size:13px}
    canvas{width:100%;aspect-ratio:16/10;background:#111a33;border:2px solid #627ddd;border-radius:10px;box-shadow:0 14px 30px rgba(0,0,0,.45)}
    .hint{font-size:13px;color:#aab3df;margin-top:8px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <strong>401 Route Race — Mavis/401 → 401E → 400N → Rutherford/400</strong>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="pill" id="leader">Leader: —</span>
      <span class="pill" id="prog">Progress: 0%</span>
      <span class="pill" id="pen">Penalty: +0.0s</span>
      <span class="pill" id="state">Press Enter</span>
    </div>
  </div>
  <canvas id="game" width="960" height="600"></canvas>
  <div class="hint">Control Hassan (green): A/D or ←/→ lane change, W/S or ↑/↓ speed. Scott (blue) is AI. Collision adds time penalty.</div>
</div>

<script>
const c=document.getElementById('game'),g=c.getContext('2d');
const ui={leader:leader,prog:prog,pen:pen,state:state};
const keys={};
let started=false,ended=false,winner='';

const route=[
  {name:'401 East (Mavis→427)',len:2200,color:'#f59e0b'},
  {name:'400 North Merge',len:1200,color:'#60a5fa'},
  {name:'400 North (to Rutherford)',len:1900,color:'#34d399'},
  {name:'Rutherford Exit',len:700,color:'#a78bfa'}
];
const totalLen=route.reduce((a,b)=>a+b.len,0);

const lanes=[210,340,470,600,730];
const hassan={name:'Hassan',color:'#22c55e',lane:1,y:470,w:56,h:100,speed:6.2,max:10.2,dist:0,pen:0,cool:0};
const scott={name:'Scott',color:'#3b82f6',lane:3,y:470,w:56,h:100,speed:6.4,max:10.0,dist:0,aiTimer:0};
let traffic=[]; let roadOff=0; let spawnCd=0; let t=0;

// Simple web-audio SFX (must start after user input)
let audioCtx=null;
function initAudio(){ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function beep(f=440,d=0.08,v=0.03,t='square'){ if(!audioCtx) return; const o=audioCtx.createOscillator(),a=audioCtx.createGain(),n=audioCtx.currentTime; o.type=t;o.frequency.setValueAtTime(f,n);o.connect(a);a.connect(audioCtx.destination);a.gain.setValueAtTime(v,n);a.gain.exponentialRampToValueAtTime(0.0001,n+d);o.start(n);o.stop(n+d); }

function reset(){
  started=false;ended=false;winner='';t=0;roadOff=0;spawnCd=0;traffic=[];
  Object.assign(hassan,{lane:1,speed:6.2,dist:0,pen:0,cool:0});
  Object.assign(scott,{lane:3,speed:6.4,dist:0,aiTimer:0});
  ui.state.textContent='Press Enter'; ui.prog.textContent='Progress: 0%'; ui.leader.textContent='Leader: —'; ui.pen.textContent='Penalty: +0.0s';
}

function carRect(p){return {x:lanes[p.lane]-p.w/2,y:p.y,w:p.w,h:p.h};}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function spawnTraffic(){
  const lane=(Math.random()*lanes.length)|0;
  traffic.push({lane,y:-120,w:58,h:104,vy:5.3+Math.random()*3.4,color:['#ef4444','#f97316','#8b5cf6','#14b8a6'][(Math.random()*4)|0]});
}

function handleInput(){
  if(hassan.cool>0) hassan.cool--;
  if(hassan.cool===0){
    if(keys.ArrowLeft||keys.KeyA){hassan.lane=clamp(hassan.lane-1,0,lanes.length-1);hassan.cool=8;}
    if(keys.ArrowRight||keys.KeyD){hassan.lane=clamp(hassan.lane+1,0,lanes.length-1);hassan.cool=8;}
  }
  if(keys.ArrowUp||keys.KeyW) hassan.speed=clamp(hassan.speed+0.08,4.5,hassan.max);
  if(keys.ArrowDown||keys.KeyS) hassan.speed=clamp(hassan.speed-0.08,4.5,hassan.max);
}

function updateScottAI(){
  scott.aiTimer--;
  if(scott.aiTimer<=0){
    // choose safer lane ahead
    let best=scott.lane,bestScore=-999;
    for(let li=0;li<lanes.length;li++){
      let danger=0;
      for(const tr of traffic){ if(tr.lane===li && tr.y>200 && tr.y<500) danger+=1; }
      const score=(Math.random()*0.6)-danger;
      if(score>bestScore){bestScore=score;best=li;}
    }
    scott.lane=best;
    scott.aiTimer=18+((Math.random()*20)|0);
  }
  scott.speed=clamp(scott.speed+((Math.random()-0.5)*0.08),5.6,scott.max);
}

function collisions(){
  const hr=carRect(hassan), sr=carRect(scott);
  for(const tr of traffic){
    const trr={x:lanes[tr.lane]-tr.w/2,y:tr.y,w:tr.w,h:tr.h};
    if(overlap(hr,trr)){
      hassan.dist=Math.max(0,hassan.dist-120);
      hassan.pen+=1.4;
      hassan.speed=Math.max(4.5,hassan.speed-1.2);
      tr.y=620;
      beep(170,0.14,0.05,'sawtooth');
    }
    if(overlap(sr,trr)){
      scott.dist=Math.max(0,scott.dist-100);
      scott.speed=Math.max(5.3,scott.speed-0.9);
      tr.y=620;
    }
  }
}

function update(){
  if(!started||ended) return;
  t++;
  roadOff += 8;
  handleInput();
  updateScottAI();

  spawnCd--; if(spawnCd<=0){spawnTraffic(); spawnCd=16+((Math.random()*20)|0);}
  for(const tr of traffic) tr.y += tr.vy + 3.2;
  traffic=traffic.filter(tr=>tr.y<700);

  hassan.dist += hassan.speed;
  scott.dist += scott.speed;
  collisions();

  const hp=hassan.dist/totalLen, sp=scott.dist/totalLen;
  const lead = hp===sp ? 'Tie' : (hp>sp?'Hassan':'Scott');
  ui.leader.textContent=`Leader: ${lead}`;
  ui.prog.textContent=`Progress: ${Math.floor(Math.max(hp,sp)*100)}%`;
  ui.pen.textContent=`Penalty: +${hassan.pen.toFixed(1)}s`;
  ui.state.textContent='Racing';

  if(hassan.dist>=totalLen||scott.dist>=totalLen){
    ended=true;
    const hTime=t/60 + hassan.pen;
    const sTime=t/60;
    winner = hTime<=sTime ? 'Hassan' : 'Scott';
    ui.state.textContent=`${winner} wins! Press R`;
    beep(880,0.2,0.05,'triangle');
  }
}

function drawRoad(){
  g.fillStyle='#1f2937'; g.fillRect(130,0,700,600);
  g.fillStyle='#374151'; g.fillRect(130,0,8,600); g.fillRect(822,0,8,600);
  g.setLineDash([26,24]); g.lineDashOffset=-roadOff; g.strokeStyle='#facc15'; g.lineWidth=3;
  for(let x=275;x<=685;x+=130){ g.beginPath(); g.moveTo(x,0); g.lineTo(x,600); g.stroke(); }
  g.setLineDash([]);
}

function drawCar(x,y,w,h,color,label){
  g.fillStyle=color; g.fillRect(x-w/2,y,w,h);
  g.fillStyle='#111827'; g.fillRect(x-w/2+8,y+12,w-16,20);
  g.fillStyle='#dbeafe'; g.fillRect(x-w/2+10,y+14,w-20,10);
  g.fillStyle='#0b0f1f'; g.fillRect(x-w/2-4,y+10,6,16); g.fillRect(x+w/2-2,y+10,6,16); g.fillRect(x-w/2-4,y+72,6,16); g.fillRect(x+w/2-2,y+72,6,16);
  g.strokeStyle='#e5e7eb'; g.lineWidth=2; g.strokeRect(x-w/2,y,w,h);
  g.fillStyle='#fff'; g.font='12px sans-serif'; g.fillText(label,x-w/2,y-8);
}

function drawMiniMap(){
  const x=16,y=16,w=330,h=110;
  g.fillStyle='rgba(12,18,38,.88)'; g.fillRect(x,y,w,h);
  g.strokeStyle='#4b63cf'; g.strokeRect(x,y,w,h);
  let cx=x+14;
  for(const seg of route){
    const sw=(seg.len/totalLen)*(w-28);
    g.fillStyle=seg.color; g.fillRect(cx,y+28,sw,10);
    g.fillStyle='#cbd5e1'; g.font='10px sans-serif'; g.fillText(seg.name,cx,y+22);
    cx+=sw;
  }
  const hx=x+14+(hassan.dist/totalLen)*(w-28);
  const sx=x+14+(scott.dist/totalLen)*(w-28);
  g.fillStyle='#22c55e'; g.fillRect(hx-3,y+44,6,12);
  g.fillStyle='#3b82f6'; g.fillRect(sx-3,y+60,6,12);
}

function draw(){
  g.clearRect(0,0,960,600);
  drawRoad();

  for(const tr of traffic){ drawCar(lanes[tr.lane],tr.y,tr.w,tr.h,tr.color,''); }
  drawCar(lanes[hassan.lane],hassan.y,hassan.w,hassan.h,hassan.color,'Hassan');
  drawCar(lanes[scott.lane],scott.y,scott.w,scott.h,scott.color,'Scott AI');

  // progress bars
  const hp=Math.min(1,hassan.dist/totalLen), sp=Math.min(1,scott.dist/totalLen);
  g.fillStyle='#111827'; g.fillRect(20,560,440,14); g.fillRect(500,560,440,14);
  g.fillStyle='#22c55e'; g.fillRect(22,562,436*hp,10);
  g.fillStyle='#3b82f6'; g.fillRect(502,562,436*sp,10);
  g.fillStyle='#fff'; g.font='12px sans-serif'; g.fillText(`Hassan ${Math.floor(hp*100)}%`,22,555); g.fillText(`Scott ${Math.floor(sp*100)}%`,502,555);

  drawMiniMap();

  if(!started||ended){
    g.fillStyle='rgba(0,0,0,.55)'; g.fillRect(0,0,960,600);
    g.fillStyle='#fff'; g.textAlign='center';
    if(!started){
      g.font='40px system-ui'; g.fillText('401 ROUTE RACE',480,240);
      g.font='18px system-ui'; g.fillText('Hassan (you) vs Scott AI',480,272);
      g.fillText('Collision adds time penalty. First to finish route wins.',480,300);
      g.fillText('Press Enter (or click) to start + enable sound',480,332);
    }else{
      g.font='40px system-ui'; g.fillText(`${winner} WINS`,480,270);
      g.font='18px system-ui'; g.fillText('Press R to race again',480,304);
    }
    g.textAlign='start';
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

addEventListener('keydown',e=>{
  keys[e.code]=true;
  if((e.code==='Enter'&&!started)){ initAudio(); beep(660,0.09,0.04,'triangle'); started=true; ui.state.textContent='Racing'; }
  if(e.code==='KeyR'){ reset(); }
});
addEventListener('keyup',e=>keys[e.code]=false);
c.addEventListener('click',()=>{ if(!started){ initAudio(); beep(660,0.09,0.04,'triangle'); started=true; ui.state.textContent='Racing'; }});

reset();
loop();
</script>
</body>
</html>
