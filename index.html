<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>401 Dash — Hassan vs Scott</title>
<style>
html,body{margin:0;padding:0;background:#070b18;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;overflow:hidden;color:#eef}
#hud{width:min(96vw,960px);display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;background:#111a3e;border:1px solid #374fc0;border-radius:9px;padding:8px 12px;margin-bottom:6px;font-size:13px}
#hud strong{font-size:14px;color:#7fa3ff}
.p{background:#1d2b57;border:1px solid #3a52c0;border-radius:999px;padding:3px 10px}
canvas{width:min(96vw,960px);aspect-ratio:16/10;border:2px solid #4a62dd;border-radius:10px;box-shadow:0 14px 36px rgba(0,0,0,.6)}
#hint{width:min(96vw,960px);font-size:12px;color:#7788bb;margin-top:5px}
</style>
</head>
<body>
<div id="hud">
  <strong>401 DASH — Mavis → Rutherford</strong>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span class="p" id="hPos">1st</span>
    <span class="p" id="hSpd">0 km/h</span>
    <span class="p" id="hSeg">401 E — Mavis</span>
    <span class="p" id="hTime">0.0s</span>
    <span class="p" id="hPen">+0.0s penalty</span>
  </div>
</div>
<canvas id="c" width="960" height="600"></canvas>
<div id="hint">A/D or ←/→ steer · W/↑ gas · S/↓ brake · M mute · R restart · Click canvas or Enter to start</div>

<script>
'use strict';
// ═══════════════════════════════════════════════
// 401 DASH — Pseudo-3D road racer
// Inspired by classic OutRun segment technique
// ═══════════════════════════════════════════════
const C=document.getElementById('c'),g=C.getContext('2d');
const W=960,H=600;

// ── Audio ──────────────────────────────────────
let AC=null,muted=false;
function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function tone(f,d,v=0.04,t='square'){if(!AC||muted)return;const o=AC.createOscillator(),ga=AC.createGain(),n=AC.currentTime;o.type=t;o.frequency.setValueAtTime(f,n);ga.gain.setValueAtTime(v,n);ga.gain.exponentialRampToValueAtTime(0.0001,n+d);o.connect(ga);ga.connect(AC.destination);o.start(n);o.stop(n+d+.01);}
function sfxCrash(){tone(90,.22,.07,'sawtooth');}
function sfxCheckpt(){tone(880,.08,.05,'triangle');setTimeout(()=>tone(1100,.12,.05,'triangle'),90);}
function sfxWin(){[660,880,1100,1320].forEach((f,i)=>setTimeout(()=>tone(f,.13,.05,'triangle'),i*100));}
function sfxLose(){[440,330,220].forEach((f,i)=>setTimeout(()=>tone(f,.18,.05,'sawtooth'),i*120));}

// ── Road constants ─────────────────────────────
const SEG=200,ROAD_W=1800,CAM_D=0.84,CAM_H=1050,DRAW=250,TOTAL_SEGS=2800;

// ── Build route ────────────────────────────────
// Segments: {curve, pitch, color, checkpoint, sign}
const segs=[];
const CL={dark:{road:'#2a2a3a',grass:'#1a2810',stripe:'#666688',center:'#eeeecc'},
          light:{road:'#333348',grass:'#223314',stripe:'#888899',center:'#eeeecc'}};

function push(curve,pitch,cp,sign){
  const i=segs.length, cl=i%2<10?CL.dark:CL.light;
  segs.push({curve:curve||0,pitch:pitch||0,x:0,y:0,z:i*SEG,w:ROAD_W,
             color:cl,checkpoint:cp||null,sign:sign||null,cars:[]});
}
// STAGE 1: 401 East — Mavis to Hurontario (straight, mild left)
for(let i=0;i<200;i++) push(i<10?0:i<20?-0.3:i<180?-0.5:0, 0, i===0?'START: Mavis/401':i===100?'Hurontario St →':null, i===0?'MAVIS/401':i===100?'EXIT: Hurontario':null);
// STAGE 2: 401 E — Hurontario to 410 (right then straight)
for(let i=0;i<180;i++) push(i<60?0.4:i<120?0:i<150?-0.2:0, 0, i===0?'Dixie Rd area':i===90?'Kennedy Rd':i===170?'Hwy 410 merge':null, i===0?'EXIT: Dixie':i===90?'EXIT: Kennedy':i===170?'MERGE: Hwy 410':null);
// STAGE 3: 401/400 Transition (strong right turn — keep right for 400N)
for(let i=0;i<160;i++) push(i<30?0.2:i<100?1.8:i<140?0.8:0, 0, i===0?'TRANSITION: 401→400N':i===80?'Keep right for 400N':null, i===0?'→ HWY 400 NORTH':i===80?'400 ON-RAMP →':null);
// STAGE 4: 400 North to Rutherford (gentle curves)
for(let i=0;i<260;i++) push(i<40?0:i<100?-0.6:i<160?0:i<200?-0.4:0, 0, i===0?'400 North':i===60?'Major Mackenzie':i===150?'Langstaff Rd':i===230?'RUTHERFORD EXIT!':null, i===0?'HWY 400 NORTH':i===150?'EXIT: Langstaff':i===230?'EXIT: Rutherford':null);

const FINISH_SEG=segs.length-10;

// ── Stickers ───────────────────────────────────
const STICKERS=['ੴ','ਵਾਹਿਗੁਰੂ','ਖਾਲਸਾ','DJ VIBE','PUNJABI','ਸਤਿ ਸ੍ਰੀ','🏏','BRAMPTON'];

// ── Player ─────────────────────────────────────
let player={pos:0,x:0,speed:0,maxSpeed:300,acc:8,brake:12,steer:0,pen:0,stun:0,finished:false};
let scott={pos:20,x:0.2,speed:0,finished:false};

// ── Traffic cars ───────────────────────────────
let traffic=[];
function mkTraffic(pos,x,color,sticker){return{pos,x,speed:120+Math.random()*80,color,sticker,w:80,destroyed:false};}
function spawnTraffic(){
  if(traffic.length>30) return;
  const pos=player.pos+300+Math.random()*600;
  const x=(Math.random()*2-1)*0.7;
  const col=['#ef4444','#f97316','#8b5cf6','#14b8a6','#64748b','#ec4899'][Math.floor(Math.random()*6)];
  const stk=Math.random()<0.55?STICKERS[Math.floor(Math.random()*STICKERS.length)]:null;
  traffic.push(mkTraffic(pos,x,col,stk));
}

// ── State ──────────────────────────────────────
let started=false,ended=false,winner='',frame=0,spawnT=0;
const keys={};let laneCD=0;

function reset(){
  player={pos:0,x:0,speed:0,maxSpeed:300,acc:8,brake:12,steer:0,pen:0,stun:0,finished:false};
  scott={pos:20,x:0.2,speed:0,finished:false};
  traffic=[];started=false;ended=false;winner='';frame=0;spawnT=0;laneCD=0;
}

// ── Project helper ─────────────────────────────
function project(sx,sy,sz,camX,camZ,camY){
  const scale=CAM_D/(sz-camZ);
  return{
    scale,
    x:Math.round(W/2 + scale*(sx-camX)*W/2),
    y:Math.round(H/2 - scale*(sy-camY)*H/2),
    w:Math.round(scale*ROAD_W*W/2)
  };
}

// ── Update ─────────────────────────────────────
let lastCheckpt=-1;
function update(){
  if(!started||ended)return;
  frame++;
  const dt=1/60;

  // player input
  if(player.stun>0){player.stun--;}else{
    if(keys.ArrowUp||keys.KeyW) player.speed=Math.min(player.speed+player.acc,player.maxSpeed);
    else player.speed=Math.max(0,player.speed-player.acc*0.4);
    if(keys.ArrowDown||keys.KeyS) player.speed=Math.max(0,player.speed-player.brake);
    if(keys.ArrowLeft||keys.KeyA) player.x=Math.max(-0.95,player.x-dt*3*(player.speed/player.maxSpeed));
    if(keys.ArrowRight||keys.KeyD) player.x=Math.min(0.95,player.x+dt*3*(player.speed/player.maxSpeed));
  }
  player.pos+=player.speed*dt;

  // road edge friction
  if(Math.abs(player.x)>0.85) player.speed*=0.97;

  // Scott AI
  scott.speed=Math.min(230+Math.sin(frame*0.03)*15,scott.speed+6);
  scott.pos+=scott.speed*dt;
  // Scott steers away from traffic lazily
  scott.x+=(Math.random()-0.5)*0.02;
  scott.x=Math.max(-0.85,Math.min(0.85,scott.x));

  // spawn traffic
  spawnT--;
  if(spawnT<=0){spawnTraffic();spawnT=35+Math.random()*30;}
  traffic.forEach(t=>{ t.pos+=t.speed*dt; });
  traffic=traffic.filter(t=>t.pos<player.pos+2000&&!t.destroyed);

  // collisions (player vs traffic)
  traffic.forEach(tr=>{
    if(Math.abs(tr.pos-player.pos)<5&&Math.abs(tr.x-player.x)<0.22){
      player.pen+=2.0;player.speed=Math.max(0,player.speed-80);
      player.stun=90;tr.destroyed=true;sfxCrash();
    }
    // Scott vs traffic
    if(Math.abs(tr.pos-scott.pos)<5&&Math.abs(tr.x-scott.x)<0.22){
      scott.speed=Math.max(80,scott.speed-60);
    }
  });

  // checkpoint announcements
  const si=Math.floor(player.pos/SEG);
  if(si<segs.length){
    const seg=segs[si];
    if(seg.checkpoint&&lastCheckpt!==si){lastCheckpt=si;sfxCheckpt();}
  }

  // finish
  if(player.pos/SEG>=FINISH_SEG||scott.pos/SEG>=FINISH_SEG){
    if(!player.finished&&player.pos/SEG>=FINISH_SEG)player.finished=true;
    if(!scott.finished&&scott.pos/SEG>=FINISH_SEG)scott.finished=true;
    if(player.finished||scott.finished){
      ended=true;
      const pFirst=player.finished&&(!scott.finished||player.pos>=scott.pos);
      winner=pFirst?'Hassan 🏆':'Scott AI 🤖';
      if(pFirst)sfxWin();else sfxLose();
    }
  }

  // HUD
  document.getElementById('hPos').textContent=player.pos>=scott.pos?'1st 🥇':'2nd 🥈';
  document.getElementById('hSpd').textContent=`${Math.round(player.speed*1.6)} km/h`;
  const si2=Math.min(Math.floor(player.pos/SEG),segs.length-1);
  const stageNames=['401E — Mavis','401E — Hurontario+','401/400 Transition','400N — to Rutherford'];
  const stageIdx=si2<200?0:si2<380?1:si2<540?2:3;
  document.getElementById('hSeg').textContent=stageNames[stageIdx];
  document.getElementById('hTime').textContent=`${(frame/60).toFixed(1)}s`;
  document.getElementById('hPen').textContent=`+${player.pen.toFixed(1)}s penalty`;
}

// ── Draw scene (pseudo-3D) ─────────────────────
function drawScene(){
  // Sky gradient
  const sky=g.createLinearGradient(0,0,0,H*0.45);
  sky.addColorStop(0,'#1a0f38');sky.addColorStop(1,'#0d1a3c');
  g.fillStyle=sky;g.fillRect(0,0,W,H);

  // City skyline
  g.fillStyle='#0b1630';
  const buildings=[[10,80,50,160],[70,100,35,160],[115,65,60,160],[190,90,40,160],[240,72,55,160],[305,105,30,160],[345,80,45,160],[410,98,30,160],[790,80,55,160],[855,95,42,160],[908,68,45,160]];
  for(const[bx,by,bw,bh]of buildings)g.fillRect(bx,by,bw,bh);
  // Windows
  g.fillStyle='rgba(255,220,100,0.4)';
  for(const[bx,by,bw,bh]of buildings){
    for(let wx=bx+4;wx<bx+bw-6;wx+=9){for(let wy=by+4;wy<by+bh-4;wy+=12){if(Math.random()<0.6)g.fillRect(wx,wy,5,7);}}
  }

  // Road rendering (segment by segment, back to front)
  const camPos=player.pos;
  const camSegIdx=Math.floor(camPos/SEG)%segs.length;
  const camX=player.x;
  const camZ=camPos-(camSegIdx*SEG);

  let x=0,dx=0,maxY=H;
  const horizon=Math.round(H*0.44);

  for(let n=0;n<DRAW&&maxY>horizon;n++){
    const idx=(camSegIdx+n)%segs.length;
    const seg=segs[idx];
    const depth=(n*SEG - camZ);

    // perspective projection for near (bottom) and far (top) edge of this strip
    const scale1=CAM_D/(depth);
    const scale2=CAM_D/(depth+SEG);
    const yNear=Math.round(H/2 - scale1*(CAM_H)*H/2);
    const yFar =Math.round(H/2 - scale2*(CAM_H)*H/2);

    if(yFar>=maxY){dx+=seg.curve;x+=dx;continue;}

    const xProj=W/2+(x-camX*W)*scale1;
    const wNear=Math.round(scale1*ROAD_W*W/2);
    const xFarProj=W/2+(x+(dx*SEG/SEG)-camX*W)*scale2;
    const wFar =Math.round(scale2*ROAD_W*W/2);

    const stripH=Math.max(0,Math.min(yNear,maxY)-Math.max(yFar,horizon));
    if(stripH<=0){dx+=seg.curve;x+=dx;maxY=Math.min(maxY,yNear);continue;}

    const yTop=Math.max(yFar,horizon);
    const yBot=Math.min(yNear,maxY);

    // grass
    g.fillStyle=seg.color.grass;
    g.fillRect(0,yTop,W,stripH);

    // road body
    g.beginPath();
    g.moveTo(xProj-wNear,yBot);
    g.lineTo(xProj+wNear,yBot);
    g.lineTo(xFarProj+wFar,yTop);
    g.lineTo(xFarProj-wFar,yTop);
    g.fillStyle=seg.color.road;g.fill();

    // road stripes (shoulder)
    const sw=wNear*0.04;
    g.fillStyle=seg.color.stripe;
    g.fillRect(xProj-wNear,yTop,sw*2,stripH);
    g.fillRect(xProj+wNear-sw*2,yTop,sw*2,stripH);

    // center dashes
    if(n%2===0){
      const cw=wNear*0.02;
      g.fillStyle=seg.color.center;
      g.fillRect(xProj-cw,yTop,cw*2,stripH);
    }

    // sign / checkpoint banner
    if(seg.sign&&n>3&&n<40){
      const banX=xProj+wNear*1.08,banY=yTop+(yBot-yTop)*0.15,banH=12+Math.round(wNear*0.14);
      g.fillStyle='#0a3a10';g.fillRect(banX-4,banY-2,52,banH+4);
      g.fillStyle='#5eff88';g.font=`bold ${Math.max(7,banH*0.55)|0}px sans-serif`;
      g.fillText(seg.sign.slice(0,14),banX,banY+banH*0.7);
    }
    if(seg.checkpoint&&n>3&&n<40){
      const banX=xProj-wNear*1.56,banY=yTop+(yBot-yTop)*0.1,banH=12+Math.round(wNear*0.16);
      g.fillStyle='#1a0060';g.fillRect(banX,banY,58,banH+4);
      g.fillStyle='#c4b5ff';g.font=`bold ${Math.max(6,banH*0.5)|0}px sans-serif`;
      g.fillText(seg.checkpoint.slice(0,16),banX+2,banY+banH*0.75);
    }

    maxY=yTop;
    dx+=seg.curve;
    x+=dx;
  }

  // ── Draw cars (traffic + Scott) ───────────────
  // Build draw list sorted far to near
  const allCars=[...traffic.map(t=>({...t,isScott:false,isHassan:false}))];
  if(!scott.finished) allCars.push({pos:scott.pos,x:scott.x,color:'#3b82f6',sticker:null,w:60,isScott:true,isHassan:false});

  allCars.sort((a,b)=>b.pos-a.pos);

  for(const car of allCars){
    const relPos=car.pos-camPos;
    if(relPos<0||relPos>DRAW*SEG)continue;
    const si2=Math.floor(car.pos/SEG)%segs.length;
    const n=Math.floor(relPos/SEG);
    const depth=relPos;
    const scale=CAM_D/depth;
    if(scale<0.01)continue;

    // accumulate curve offset up to this car
    let cx2=0,cdx2=0;
    for(let nn=0;nn<Math.min(n,DRAW);nn++){cx2+=cdx2;cdx2+=segs[(camSegIdx+nn)%segs.length].curve;}
    const cx=W/2+(car.x*ROAD_W*scale*W/2)+(cx2-camX*W)*scale;
    const cy=Math.round(H/2 - scale*CAM_H*H/2);
    const cw=Math.round(scale*car.w*3.5);
    const ch=Math.round(cw*1.8);
    if(cy<horizon||cy>H||cw<4)continue;

    // car body
    g.fillStyle=car.color;g.fillRect(cx-cw/2,cy-ch,cw,ch);
    // roof
    g.fillStyle='#111';g.fillRect(cx-cw*0.35,cy-ch+ch*0.12,cw*0.7,ch*0.3);
    // windshield
    g.fillStyle='rgba(100,150,255,.18)';g.fillRect(cx-cw*0.32,cy-ch+ch*0.14,cw*0.64,ch*0.24);
    // brake lights
    g.fillStyle='#ff2200';g.fillRect(cx-cw*0.45,cy-ch*0.1,cw*0.2,ch*0.08);g.fillRect(cx+cw*0.25,cy-ch*0.1,cw*0.2,ch*0.08);
    // sticker
    if(car.sticker&&cw>18){
      g.fillStyle='rgba(255,255,255,.92)';g.font=`bold ${Math.max(7,cw*0.38)|0}px sans-serif`;
      g.textAlign='center';g.fillText(car.sticker,cx,cy-ch*0.55);g.textAlign='left';
    }
    // name label for Scott
    if(car.isScott&&cw>12){
      g.fillStyle='#93c5fd';g.font=`bold ${Math.max(8,cw*0.4)|0}px sans-serif`;
      g.textAlign='center';g.fillText('SCOTT',cx,cy-ch-4);g.textAlign='left';
    }
  }

  // ── Hassan's car (always screen center-bottom) ─
  const px=W/2,py=H-80;
  const pw=72,ph=120;
  // glow
  g.shadowColor='#22c55e';g.shadowBlur=22;
  g.fillStyle='#22c55e';g.fillRect(px-pw/2,py-ph,pw,ph);
  g.shadowBlur=0;
  // roof
  g.fillStyle='#0b1f0b';g.fillRect(px-pw*0.38,py-ph+ph*0.1,pw*0.76,ph*0.28);
  g.fillStyle='rgba(100,200,255,.15)';g.fillRect(px-pw*0.34,py-ph+ph*0.12,pw*0.68,ph*0.2);
  // hood
  g.fillStyle='#1a4a1a';g.fillRect(px-pw*0.4,py-ph*0.3,pw*0.8,ph*0.25);
  // headlights
  g.fillStyle='#fffac0';g.fillRect(px-pw*0.44,py-ph+4,pw*0.16,ph*0.06);g.fillRect(px+pw*0.28,py-ph+4,pw*0.16,ph*0.06);
  // tires
  g.fillStyle='#111';g.fillRect(px-pw/2-6,py-ph*0.22,9,22);g.fillRect(px+pw/2-3,py-ph*0.22,9,22);
  g.fillRect(px-pw/2-6,py-ph*0.77,9,22);g.fillRect(px+pw/2-3,py-ph*0.77,9,22);
  // plate
  g.fillStyle='#f1f5f9';g.fillRect(px-20,py-14,40,12);
  g.fillStyle='#111';g.font='bold 8px monospace';g.textAlign='center';g.fillText('HASSAN',px,py-5);g.textAlign='left';
  // stun flash
  if(player.stun>0){g.fillStyle=`rgba(255,60,60,${player.stun/90})`;g.fillRect(px-pw/2-10,py-ph-10,pw+20,ph+20);}

  // ── Speedometer ────────────────────────────────
  const sx=W-120,sy=H-120,sr=50;
  g.fillStyle='rgba(8,14,36,.75)';g.beginPath();g.arc(sx,sy,sr,0,Math.PI*2);g.fill();
  g.strokeStyle='#3a52b8';g.lineWidth=2;g.beginPath();g.arc(sx,sy,sr,0,Math.PI*2);g.stroke();
  const spd=player.speed/player.maxSpeed;
  g.strokeStyle='#22c55e';g.lineWidth=4;g.beginPath();
  g.arc(sx,sy,sr-6,Math.PI*0.75,(Math.PI*0.75+spd*Math.PI*1.5));g.stroke();
  g.fillStyle='#fff';g.font='bold 15px system-ui';g.textAlign='center';
  g.fillText(`${Math.round(player.speed*1.6)}`,sx,sy+6);
  g.font='10px system-ui';g.fillText('km/h',sx,sy+19);
  g.textAlign='left';

  // ── Minimap ────────────────────────────────────
  const mx=14,my=14,mw=200,mh=80;
  g.fillStyle='rgba(8,14,36,.82)';g.fillRect(mx,my,mw,mh);
  g.strokeStyle='#3a52b8';g.strokeRect(mx,my,mw,mh);
  // draw route curve as a polyline
  const totalSegs=segs.length;
  const scaleM=mw/totalSegs;
  g.strokeStyle='#4a6aaa';g.lineWidth=6;g.beginPath();
  let mmx=mx+4,mmy=my+mh/2;g.moveTo(mmx,mmy);
  let cumCurve=0;
  for(let si=0;si<totalSegs;si+=4){
    cumCurve+=segs[si].curve*0.8;
    mmx=mx+4+si*scaleM;
    mmy=clamp(my+mh/2+cumCurve*8,my+4,my+mh-4);
    g.lineTo(mmx,mmy);
  }
  g.stroke();
  // finish line
  const fmx=mx+4+FINISH_SEG*scaleM;
  g.strokeStyle='#facc15';g.lineWidth=2;g.beginPath();g.moveTo(fmx,my+2);g.lineTo(fmx,my+mh-2);g.stroke();
  // Hassan dot
  const hmx=mx+4+(player.pos/SEG)*scaleM;
  let hmy=my+mh/2;
  g.fillStyle='#22c55e';g.beginPath();g.arc(clamp(hmx,mx+4,mx+mw-4),hmy,5,0,Math.PI*2);g.fill();
  // Scott dot
  const smx=mx+4+(scott.pos/SEG)*scaleM;
  g.fillStyle='#3b82f6';g.beginPath();g.arc(clamp(smx,mx+4,mx+mw-4),hmy,4,0,Math.PI*2);g.fill();
  // labels
  g.fillStyle='#94a3b8';g.font='9px sans-serif';g.fillText('Mavis',mx+4,my+mh-2);
  g.fillText('Rutherford',mx+mw-55,my+mh-2);
  g.fillStyle='#facc15';g.fillText('FINISH',fmx-14,my+13);

  // ── Start/End overlays ─────────────────────────
  if(!started||ended){
    g.fillStyle='rgba(0,0,0,.62)';g.fillRect(0,0,W,H);
    g.textAlign='center';
    if(!started){
      g.fillStyle='#a5b8ff';g.font='bold 46px system-ui';g.fillText('401 DASH',W/2,220);
      g.fillStyle='#64748b';g.font='18px system-ui';g.fillText('Hassan (YOU, green) vs Scott AI (blue)',W/2,258);
      g.fillText('Mavis/401  →  400N  →  Rutherford Rd',W/2,284);
      g.fillStyle='#facc15';g.font='bold 18px system-ui';g.fillText('Click or press Enter to start',W/2,326);
    }else if(ended){
      const win=winner.includes('Hassan');
      g.fillStyle=win?'#86efac':'#fca5a5';g.font='bold 46px system-ui';g.fillText(winner+' WINS',W/2,260);
      g.fillStyle='#cbd5e1';g.font='18px system-ui';
      const hT=(frame/60+player.pen).toFixed(1),sT=(frame/60).toFixed(1);
      g.fillText(`Hassan: ${hT}s total (${player.pen.toFixed(1)}s penalties) · Scott: ${sT}s`,W/2,296);
      g.fillStyle='#facc15';g.font='bold 16px system-ui';g.fillText('Press R to race again',W/2,330);
    }
    g.textAlign='left';
  }
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

// ── Main loop ──────────────────────────────────
function loop(){update();drawScene();requestAnimationFrame(loop);}

// ── Input ──────────────────────────────────────
function startGame(){if(!started){initAudio();started=true;}}
addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Enter')startGame();
  if(e.code==='KeyR')reset();
  if(e.code==='KeyM'){muted=!muted;document.getElementById('hSeg').textContent+=(muted?' 🔇':'');}
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
addEventListener('keyup',e=>keys[e.code]=false);
C.addEventListener('click',startGame);

reset();
loop();
</script>
</body>
